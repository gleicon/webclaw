name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip GitHub release)"
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install brotli
        run: sudo apt-get install -y brotli

      - name: Download Go modules
        run: go mod download

      - name: Install npm dependencies
        run: npm ci

      - name: Compile Go → WASM
        run: |
          mkdir -p dist static
          GOOS=js GOARCH=wasm go build -o dist/webclaw.wasm ./cmd/webclaw/

      - name: Brotli-compress WASM
        run: brotli --best -f dist/webclaw.wasm -o dist/webclaw.wasm.br

      - name: Copy wasm_exec.js from Go toolchain
        run: cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" static/wasm_exec.js

      - name: Compile Tailwind CSS
        run: npx tailwindcss -i src/styles/main.css -o static/main.css --content "index.html,src/**/*.{js,ts,jsx,tsx}"

      - name: Copy WASM to static dir
        run: cp dist/webclaw.wasm static/webclaw.wasm

      - name: Vite build → dist-bundle/
        run: npm run build

      - name: Create release archive
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          mkdir -p release
          cd dist-bundle && zip -r ../release/webclaw-${VERSION}.zip . && cd ..
          ls -lh release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: release/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
