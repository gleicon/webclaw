name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip npm publish)"
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build all bundles
        run: npm run build:all

      - name: Create release archives
        run: |
          mkdir -p release
          VERSION=${GITHUB_REF_NAME#v}
          echo "Creating release archives for version: $VERSION"

          # Multi-file bundle
          if [ -d "dist-bundle" ]; then
            cd dist-bundle && zip -r ../release/webclaw-v${VERSION}.zip . && cd ..
            echo "Created: webclaw-v${VERSION}.zip"
          fi

          # Single-file bundle
          if [ -d "dist-singlefile" ]; then
            cd dist-singlefile && zip -r ../release/webclaw-v${VERSION}-singlefile.zip . && cd ..
            echo "Created: webclaw-v${VERSION}-singlefile.zip"
          fi

          # Ultimate standalone
          if [ -f "dist-singlefile/webclaw-ultimate.html" ]; then
            cp dist-singlefile/webclaw-ultimate.html release/webclaw-v${VERSION}-ultimate.html
            echo "Created: webclaw-v${VERSION}-ultimate.html"
          fi

          # List created files
          ls -la release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-bundles
          path: release/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-bundles
          path: release/

      - name: List release files
        run: ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !github.event.inputs.dry_run
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:all

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Docker Build and Push
        if: success()
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          docker build -t ${{ secrets.DOCKER_USERNAME }}/webclaw:${VERSION} .
          docker push ${{ secrets.DOCKER_USERNAME }}/webclaw:${VERSION}
          docker tag ${{ secrets.DOCKER_USERNAME }}/webclaw:${VERSION} ${{ secrets.DOCKER_USERNAME }}/webclaw:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/webclaw:latest
        continue-on-error: true
