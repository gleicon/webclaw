name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install brotli
        run: sudo apt-get install -y brotli

      - name: Download Go modules
        run: go mod download

      - name: Install npm dependencies
        run: npm ci

      - name: Compile Go → WASM
        run: |
          mkdir -p dist static
          GOOS=js GOARCH=wasm go build -o dist/webclaw.wasm ./cmd/webclaw/

      - name: Brotli-compress WASM
        run: brotli --best -f dist/webclaw.wasm -o dist/webclaw.wasm.br

      - name: Copy wasm_exec.js from Go toolchain
        run: cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" static/wasm_exec.js

      - name: Compile Tailwind CSS
        run: npx tailwindcss -i src/styles/main.css -o static/main.css --content "index.html,src/**/*.{js,ts,jsx,tsx}"

      - name: Copy WASM to static dir
        run: cp dist/webclaw.wasm static/webclaw.wasm

      - name: Vite build → dist-bundle/
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-bundle/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
