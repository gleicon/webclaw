name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci

      - name: Go unit tests
        run: go test ./internal/agent/... ./internal/tools/...

      - name: WASM provider tests (via Node)
        run: |
          GOROOT=$(go env GOROOT)
          GOOS=js GOARCH=wasm PATH="$GOROOT/lib/wasm:$PATH" \
            go test ./internal/provider/...
