name: Bridge Release

on:
  push:
    tags:
      - 'bridge-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build bridge binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
          TAG_NAME: ${{ github.ref_name }}
          TARGET_OS: ${{ matrix.os }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          go build -ldflags "-s -w -X main.version=${TAG_NAME}" \
            -o "webclaw-bridge-${TARGET_OS}-${TARGET_ARCH}" \
            ./cmd/bridge
          tar -czf "webclaw-bridge-${TARGET_OS}-${TARGET_ARCH}.tar.gz" \
            "webclaw-bridge-${TARGET_OS}-${TARGET_ARCH}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.os }}-${{ matrix.arch }}
          path: webclaw-bridge-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
