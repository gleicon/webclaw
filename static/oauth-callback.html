<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OAuth Callback - WebClaw</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container {
      padding: 2rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #374151;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .success { color: #10b981; }
    .error { color: #ef4444; }
    h2 { margin: 0 0 0.5rem; font-size: 1.25rem; }
    p { margin: 0; color: #9ca3af; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="container">
    <div id="status">
      <div class="spinner"></div>
      <h2>Completing authentication...</h2>
      <p>Please wait while we finish connecting your account.</p>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      function sendMessageAndClose(data) {
        if (window.opener) {
          // Send message to parent window
          window.opener.postMessage({
            type: 'oauth-callback',
            ...data
          }, '*');
          
          // Close popup after short delay
          setTimeout(() => window.close(), 500);
        } else {
          // No opener - show manual close message
          showStatus('error', 'Error', 'Unable to communicate with main window. Please close this tab manually.');
        }
      }

      function showStatus(type, title, message) {
        const status = document.getElementById('status');
        const icon = type === 'success' ? '✓' : type === 'error' ? '✗' : '⋯';
        status.innerHTML = `
          <div style="font-size: 48px; margin-bottom: 1rem;">${icon}</div>
          <h2 class="${type}">${title}</h2>
          <p>${message}</p>
          ${type === 'error' ? '<p style="margin-top: 1rem;"><button onclick="window.close()" style="background: #374151; color: #f3f4f6; border: none; padding: 0.5rem 1rem; border-radius: 0.375rem; cursor: pointer;">Close Window</button></p>' : ''}
        `;
      }

      // Parse URL parameters
      const urlParams = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.substring(1));
      
      // Check for error in query string or hash
      const error = urlParams.get('error') || hashParams.get('error');
      const errorDescription = urlParams.get('error_description') || hashParams.get('error_description');
      
      if (error) {
        showStatus('error', 'Authentication Failed', errorDescription || error);
        sendMessageAndClose({
          error: error,
          error_description: errorDescription || 'Unknown error'
        });
        return;
      }

      // Get authorization code from query string or hash
      const code = urlParams.get('code') || hashParams.get('code');
      const state = urlParams.get('state') || hashParams.get('state');

      if (!code) {
        showStatus('error', 'Error', 'No authorization code received. Please try again.');
        sendMessageAndClose({
          error: 'no_code',
          error_description: 'No authorization code received'
        });
        return;
      }

      // Success!
      showStatus('success', 'Success!', 'Authentication complete. Closing window...');
      sendMessageAndClose({
        code: code,
        state: state
      });
    })();
  </script>
</body>
</html>
