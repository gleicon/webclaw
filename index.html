<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebClaw</title>

    <!-- Bundled Tailwind CSS (compiled by Vite) -->
    <link rel="stylesheet" href="./src/styles/main.css" />

    <!-- just-bash for browser-only file operations (Phase 7a) -->
    <script src="node_modules/just-bash/dist/bundle/browser.js"></script>
    <script src="static/justbash-bridge.js"></script>
    <script src="static/wasm_exec.js"></script>
    <script src="static/webclaw-host.js"></script>
  </head>
  <body
    class="bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden"
  >
    <!-- Tab Bar -->
    <nav class="flex border-b border-gray-700 bg-gray-900 shrink-0">
      <button
        id="tab-chat"
        class="tab-btn px-6 py-3 text-sm font-medium border-b-2 border-indigo-500 text-indigo-400"
      >
        Chat
      </button>
      <button
        id="tab-settings"
        class="tab-btn px-6 py-3 text-sm font-medium text-gray-400 hover:text-gray-200"
      >
        Settings
      </button>
      <button
        id="tab-identity"
        class="tab-btn px-6 py-3 text-sm font-medium text-gray-400 hover:text-gray-200"
      >
        Identity Files
      </button>
      <button
        id="help-docs-btn"
        class="tab-btn px-6 py-3 text-sm font-medium text-gray-400 hover:text-indigo-300 ml-auto flex items-center gap-2"
        onclick="window.loadHelpDocs()"
      >
        <span>📚</span> Help
      </button>
    </nav>

    <!-- Chat View: two-column layout -->
    <div id="view-chat" class="flex flex-1 overflow-hidden">
      <!-- Chat Column -->
      <div class="flex flex-col flex-1 overflow-hidden">
        <!-- Model selector header -->
        <div
          class="flex items-center gap-3 px-4 py-2 border-b border-gray-700 shrink-0"
        >
          <label class="text-xs text-gray-400">Model</label>
          <select
            id="model-selector"
            class="bg-gray-800 border border-gray-600 rounded px-2 py-1 text-sm text-gray-100 focus:outline-none focus:border-indigo-500"
          >
            <option value="anthropic/claude-sonnet-4-5">
              Anthropic / claude-sonnet-4-5
            </option>
            <option value="anthropic/claude-opus-4">
              Anthropic / claude-opus-4
            </option>
            <option value="openai/gpt-4o">OpenAI / gpt-4o</option>
            <option value="openrouter/anthropic/claude-sonnet-4-5">
              OpenRouter / claude-sonnet-4-5
            </option>
          </select>
          <span id="stream-status" class="text-xs text-gray-500 ml-auto"></span>
        </div>
        <!-- Message list -->
        <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        <!-- Input area -->
        <div class="p-4 border-t border-gray-700 shrink-0">
          <div class="flex gap-2 items-end">
            <textarea
              id="user-input"
              class="flex-1 bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-100 resize-none focus:outline-none focus:border-indigo-500"
              rows="3"
              placeholder="Type a message... (Enter to send, Shift+Enter for newline)"
            ></textarea>
            <button
              id="send-btn"
              class="bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg px-4 py-2 text-sm font-medium shrink-0"
            >
              Send
            </button>
            <button
              id="abort-btn"
              class="hidden bg-red-700 hover:bg-red-600 text-white rounded-lg px-4 py-2 text-sm font-medium shrink-0"
            >
              Stop
            </button>
          </div>
        </div>
      </div>
      <!-- Tool Activity Panel — always visible on right -->
      <div
        class="w-72 border-l border-gray-700 flex flex-col overflow-hidden shrink-0"
      >
        <div class="px-3 py-2 border-b border-gray-700 shrink-0">
          <h2
            class="text-xs font-semibold text-gray-400 uppercase tracking-wide"
          >
            Tool Activity
          </h2>
        </div>
        <div
          id="tool-events"
          class="flex-1 overflow-y-auto p-2 space-y-2"
        ></div>
      </div>
    </div>

    <!-- Settings View (hidden) -->
    <div id="view-settings" class="hidden flex-1 overflow-y-auto p-6 space-y-6">
      <section>
        <h2 class="text-sm font-semibold text-gray-300 mb-3">API Keys</h2>
        <div id="api-keys-container" class="space-y-3">
          <!-- Built dynamically by buildSettingsUI() -->
          <p class="text-xs text-gray-500">Loading API key forms...</p>
        </div>
      </section>
      <section>
        <h2 class="text-sm font-semibold text-gray-300 mb-3">Configuration</h2>
        <div class="flex gap-3">
          <button
            id="export-config-btn"
            class="bg-gray-700 hover:bg-gray-600 text-gray-200 rounded px-4 py-2 text-sm"
          >
            Export Config
          </button>
          <button
            id="import-config-btn"
            class="bg-gray-700 hover:bg-gray-600 text-gray-200 rounded px-4 py-2 text-sm"
          >
            Import Config
          </button>
          <input
            id="import-file-input"
            type="file"
            accept=".json"
            class="hidden"
          />
        </div>
      </section>

      <!-- Connected Services Section -->
      <section id="connected-services-section">
        <h2 class="text-sm font-semibold text-gray-300 mb-3">
          Connected Services
        </h2>
        <p class="text-xs text-gray-500 mb-4">
          Connect your accounts to enable social and productivity integrations.
        </p>
        <div id="connected-services-list" class="space-y-3">
          <!-- Built dynamically by buildConnectedServicesUI() -->
          <p class="text-xs text-gray-500">Loading connected services...</p>
        </div>
      </section>
    </div>

    <!-- Identity Files View (hidden) -->
    <div id="view-identity" class="hidden flex-1 overflow-hidden">
      <!-- File list (left) -->
      <div
        id="identity-file-list"
        class="w-48 border-r border-gray-700 overflow-y-auto p-2 space-y-1 shrink-0"
      ></div>
      <!-- Editor (right) -->
      <div class="flex flex-col flex-1 overflow-hidden">
        <div
          class="px-4 py-2 border-b border-gray-700 flex items-center justify-between shrink-0"
        >
          <span id="identity-filename" class="text-sm text-gray-400"
            >Select a file</span
          >
          <button
            id="identity-save-btn"
            class="hidden bg-indigo-600 hover:bg-indigo-500 text-white rounded px-3 py-1 text-xs"
          >
            Save
          </button>
        </div>
        <textarea
          id="identity-editor"
          class="flex-1 bg-gray-900 text-gray-100 font-mono text-sm p-4 resize-none focus:outline-none"
          placeholder="Select a file to edit..."
        ></textarea>
      </div>
    </div>

    <script>
      (function () {
        "use strict";

        // State
        let isStreaming = false;
        let activeIdentityFile = null;
        let agentBubble = null;
        let streamCursor = null;

        // DOM refs
        const tabChat = document.getElementById("tab-chat");
        const tabSettings = document.getElementById("tab-settings");
        const tabIdentity = document.getElementById("tab-identity");
        const viewChat = document.getElementById("view-chat");
        const viewSettings = document.getElementById("view-settings");
        const viewIdentity = document.getElementById("view-identity");
        const modelSelector = document.getElementById("model-selector");
        const messages = document.getElementById("messages");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const abortBtn = document.getElementById("abort-btn");
        const streamStatus = document.getElementById("stream-status");
        const toolEvents = document.getElementById("tool-events");
        const apiKeysContainer = document.getElementById("api-keys-container");
        const identityFileList = document.getElementById("identity-file-list");
        const identityFilename = document.getElementById("identity-filename");
        const identitySaveBtn = document.getElementById("identity-save-btn");
        const identityEditor = document.getElementById("identity-editor");
        const exportConfigBtn = document.getElementById("export-config-btn");
        const importConfigBtn = document.getElementById("import-config-btn");
        const importFileInput = document.getElementById("import-file-input");

        // ==========================================
        // Provider Status Indicators
        // ==========================================
        let availableProviders = [];
        let failedProviders = []; // Track providers that failed (invalid key, no credits)
        let pausedProviders = []; // Track providers manually paused by user

        window.addEventListener("webclaw:providers-ready", function (e) {
          const detail = e.detail || {};
          availableProviders = detail.providers || [];
          const count = detail.count || 0;
          console.log("[UI] Providers ready event:", e);
          console.log("[UI] Event detail:", detail);
          console.log("[UI] Providers array:", availableProviders);
          console.log("[UI] Count:", count);
          console.log("[UI] Providers ready:", count, "providers available");

          // Update provider status indicators in settings
          updateProviderStatusIndicators();

          // Update model selector to disable failed/paused providers
          updateModelSelector();

          // Auto-select first available provider if current selection has no key or is paused/failed
          if (count > 0 && modelSelector) {
            const currentModel = modelSelector.value;
            const currentProvider = currentModel.split("/")[0];
            const isCurrentPaused = pausedProviders.includes(currentProvider);
            const isCurrentFailed = failedProviders.includes(currentProvider);
            const isCurrentAvailable =
              availableProviders.includes(currentProvider);

            if (!isCurrentAvailable || isCurrentPaused || isCurrentFailed) {
              // Current provider not available, paused, or failed - switch to first working provider
              const firstWorking = availableProviders.find(
                (p) =>
                  !pausedProviders.includes(p) && !failedProviders.includes(p),
              );
              if (firstWorking) {
                console.log(
                  "[UI] Auto-switching to working provider:",
                  firstWorking,
                );
                // Find model for this provider
                const options = modelSelector.querySelectorAll("option");
                for (let i = 0; i < options.length; i++) {
                  if (options[i].value.startsWith(firstWorking + "/")) {
                    modelSelector.selectedIndex = i;
                    console.log("[UI] Selected model:", options[i].value);
                    break;
                  }
                }
              }
            }
          }
        });

        function updateProviderStatusIndicators() {
          API_PROVIDERS.forEach(function (provider) {
            const statusEl = document.getElementById(
              "provider-status-" + provider.id,
            );
            const testBtn = document.getElementById("test-btn-" + provider.id);
            const pauseBtn = document.getElementById(
              "pause-btn-" + provider.id,
            );
            const row = statusEl ? statusEl.closest(".flex") : null;

            if (statusEl) {
              const isAvailable = availableProviders.includes(provider.id);
              const isFailed = failedProviders.includes(provider.id);
              const isPaused = pausedProviders.includes(provider.id);

              if (isPaused) {
                // Paused provider - yellow/orange
                statusEl.innerHTML =
                  '<span class="inline-flex items-center"><span class="w-2 h-2 rounded-full bg-yellow-500 mr-1"></span>Paused</span>';
                statusEl.className = "text-xs text-yellow-400";
                if (row) {
                  row.classList.remove("opacity-50");
                }
              } else if (isFailed) {
                // Failed provider - grey out
                statusEl.innerHTML =
                  '<span class="inline-flex items-center"><span class="w-2 h-2 rounded-full bg-gray-500 mr-1"></span>Failed</span>';
                statusEl.className = "text-xs text-gray-400";
                if (row) {
                  row.classList.add("opacity-50");
                }
              } else if (isAvailable) {
                // Available provider - green
                statusEl.innerHTML =
                  '<span class="inline-flex items-center"><span class="w-2 h-2 rounded-full bg-green-500 mr-1"></span>Connected</span>';
                statusEl.className = "text-xs text-green-400";
                if (row) {
                  row.classList.remove("opacity-50");
                }
              } else {
                // No key - red
                statusEl.innerHTML =
                  '<span class="inline-flex items-center"><span class="w-2 h-2 rounded-full bg-red-500 mr-1"></span>No key</span>';
                statusEl.className = "text-xs text-red-400";
                if (row) {
                  row.classList.remove("opacity-50");
                }
              }
            }

            // Show/hide test button based on provider status
            if (testBtn) {
              const isAvailable = availableProviders.includes(provider.id);
              const isFailed = failedProviders.includes(provider.id);
              const isPaused = pausedProviders.includes(provider.id);
              if (isAvailable && !isFailed && !isPaused) {
                testBtn.classList.remove("hidden");
              } else {
                testBtn.classList.add("hidden");
              }
            }

            // Show/hide pause button based on provider availability
            if (pauseBtn) {
              const isAvailable = availableProviders.includes(provider.id);
              const isPaused = pausedProviders.includes(provider.id);

              if (isAvailable) {
                pauseBtn.classList.remove("hidden");
                if (isPaused) {
                  pauseBtn.innerHTML = "▶️";
                  pauseBtn.title = "Resume provider";
                  pauseBtn.classList.remove(
                    "bg-yellow-700",
                    "hover:bg-yellow-600",
                  );
                  pauseBtn.classList.add("bg-green-700", "hover:bg-green-600");
                } else {
                  pauseBtn.innerHTML = "⏸️";
                  pauseBtn.title = "Pause provider";
                  pauseBtn.classList.remove(
                    "bg-green-700",
                    "hover:bg-green-600",
                  );
                  pauseBtn.classList.add(
                    "bg-yellow-700",
                    "hover:bg-yellow-600",
                  );
                }
              } else {
                pauseBtn.classList.add("hidden");
              }
            }
          });

          // Update demo mode indicator
          updateDemoModeIndicator();
        }

        function updateModelSelector() {
          // Grey out models from failed or paused providers in the dropdown
          const options = modelSelector.querySelectorAll("option");
          options.forEach(function (option) {
            const provider = option.value.split("/")[0];
            const originalText =
              option.getAttribute("data-original-text") || option.textContent;

            if (!option.getAttribute("data-original-text")) {
              option.setAttribute("data-original-text", originalText);
            }

            const isFailed = failedProviders.includes(provider);
            const isPaused = pausedProviders.includes(provider);

            if (isFailed) {
              option.disabled = true;
              option.textContent =
                "[Failed] " + originalText + " (invalid key/no credits)";
              option.classList.add("text-gray-500");
            } else if (isPaused) {
              option.disabled = true;
              option.textContent = "[Paused] " + originalText;
              option.classList.add("text-yellow-600");
            } else {
              option.disabled = false;
              option.textContent = originalText;
              option.classList.remove("text-gray-500", "text-yellow-600");
            }
          });
        }

        function updateDemoModeIndicator() {
          const demoIndicator = document.getElementById("demo-mode-indicator");
          if (demoIndicator) {
            if (availableProviders.length === 0) {
              demoIndicator.classList.remove("hidden");
            } else {
              demoIndicator.classList.add("hidden");
            }
          }
        }

        // ==========================================
        // Error Toast Notifications
        // ==========================================
        function showErrorToast(message) {
          // Remove existing toast if present
          const existingToast = document.getElementById("error-toast");
          if (existingToast) {
            existingToast.remove();
          }

          // Create toast element
          const toast = document.createElement("div");
          toast.id = "error-toast";
          toast.className =
            "fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-red-900 text-red-100 px-4 py-3 rounded-lg shadow-lg z-50 flex items-center gap-3 max-w-md";
          toast.innerHTML =
            '<span class="text-red-400">⚠</span><span>' + message + "</span>";

          document.body.appendChild(toast);

          // Auto-remove after 5 seconds
          setTimeout(function () {
            if (toast.parentNode) {
              toast.remove();
            }
          }, 5000);
        }

        // ==========================================
        // Tab Switching
        // ==========================================
        function switchTab(name) {
          // Reset all tabs
          tabChat.className =
            "tab-btn px-6 py-3 text-sm font-medium text-gray-400 hover:text-gray-200";
          tabSettings.className =
            "tab-btn px-6 py-3 text-sm font-medium text-gray-400 hover:text-gray-200";
          tabIdentity.className =
            "tab-btn px-6 py-3 text-sm font-medium text-gray-400 hover:text-gray-200";
          viewChat.classList.add("hidden");
          viewChat.classList.remove("flex");
          viewSettings.classList.add("hidden");
          viewIdentity.classList.add("hidden");
          viewIdentity.classList.remove("flex");

          // Activate selected tab
          if (name === "chat") {
            tabChat.className =
              "tab-btn px-6 py-3 text-sm font-medium border-b-2 border-indigo-500 text-indigo-400";
            viewChat.classList.remove("hidden");
            viewChat.classList.add("flex");
          } else if (name === "settings") {
            tabSettings.className =
              "tab-btn px-6 py-3 text-sm font-medium border-b-2 border-indigo-500 text-indigo-400";
            viewSettings.classList.remove("hidden");
          } else if (name === "identity") {
            tabIdentity.className =
              "tab-btn px-6 py-3 text-sm font-medium border-b-2 border-indigo-500 text-indigo-400";
            viewIdentity.classList.remove("hidden");
            viewIdentity.classList.add("flex");
            buildIdentityFileList();
          }
        }

        tabChat.addEventListener("click", () => switchTab("chat"));
        tabSettings.addEventListener("click", () => switchTab("settings"));
        tabIdentity.addEventListener("click", () => switchTab("identity"));

        // ==========================================
        // Message Bubbles (DOM-safe, no string injection)
        // ==========================================
        function scrollToBottom() {
          messages.scrollTop = messages.scrollHeight;
        }

        function appendUserBubble(content) {
          const wrapper = document.createElement("div");
          wrapper.className = "flex justify-end";

          const bubble = document.createElement("div");
          bubble.className =
            "max-w-[70%] rounded-2xl rounded-tr-sm px-4 py-2 bg-indigo-600 text-white text-sm";
          bubble.textContent = content;

          wrapper.appendChild(bubble);
          messages.appendChild(wrapper);
          scrollToBottom();
        }

        function appendAgentBubble() {
          const wrapper = document.createElement("div");
          wrapper.className = "flex justify-start";

          const bubble = document.createElement("div");
          bubble.className =
            "max-w-[70%] rounded-2xl rounded-tl-sm px-4 py-2 bg-gray-700 text-gray-100 text-sm";

          wrapper.appendChild(bubble);
          messages.appendChild(wrapper);
          scrollToBottom();

          return bubble;
        }

        function appendErrorBubble(message) {
          const wrapper = document.createElement("div");
          wrapper.className = "flex justify-start";

          const bubble = document.createElement("div");
          bubble.className =
            "max-w-[70%] rounded-2xl px-4 py-2 bg-red-900 text-red-200 text-sm";
          bubble.textContent = message;

          wrapper.appendChild(bubble);
          messages.appendChild(wrapper);
          scrollToBottom();
        }

        function createStreamingCursor() {
          const cursor = document.createElement("span");
          cursor.id = "stream-cursor";
          cursor.className =
            "inline-block w-2 h-4 bg-gray-400 animate-pulse ml-1 align-middle";
          return cursor;
        }

        // ==========================================
        // Send Message Flow
        // ==========================================
        function sendMessage() {
          // Prevent sending if already streaming (e.g., during test connection)
          if (isStreaming) {
            console.log(
              "[UI] Cannot send message - stream already in progress",
            );
            return;
          }

          const content = userInput.value.trim();
          if (!content) return;

          // Handle slash commands
          if (content.startsWith("/")) {
            const match = content.match(/^\/([a-zA-Z]+)(?:\s+(.*))?$/);
            if (match) {
              const command = match[1];
              const args = match[2] || "";

              if (handleSlashCommand(command, args)) {
                // Command was handled, clear input and return
                userInput.value = "";
                return;
              }
            }
          }

          // Don't allow sending if no providers are available
          if (availableProviders.length === 0) {
            showErrorToast(
              "Please enter your API key in Settings to enable live AI",
            );
            return;
          }

          // Parse model selector (vendor/model-id format)
          const modelValue = modelSelector.value;
          const slashIdx = modelValue.indexOf("/");
          const provider =
            slashIdx > 0 ? modelValue.substring(0, slashIdx) : "anthropic";
          const model =
            slashIdx > 0 ? modelValue.substring(slashIdx + 1) : modelValue;

          // Validate provider is available
          if (availableProviders.length === 0) {
            showErrorToast(
              "Please enter your API key in Settings to enable live AI",
            );
            return;
          }

          // Check if selected provider is available
          if (!availableProviders.includes(provider)) {
            // Try to suggest alternative
            const providerName =
              provider.charAt(0).toUpperCase() + provider.slice(1);
            showErrorToast(
              "Please enter your " +
                providerName +
                " API key in Settings, or select a different model",
            );
            return;
          }

          // Clear input and show user bubble
          userInput.value = "";
          appendUserBubble(content);

          // Create agent bubble for streaming
          agentBubble = appendAgentBubble();
          streamCursor = createStreamingCursor();
          agentBubble.appendChild(streamCursor);

          // Set streaming state
          isStreaming = true;
          streamStatus.textContent = "Streaming...";
          sendBtn.classList.add("hidden");
          abortBtn.classList.remove("hidden");

          // Guard webclawHost availability
          if (!window.webclawHost) {
            appendErrorBubble("WebClaw host not initialized");
            resetStreamingState();
            return;
          }

          // Add message to conversation history
          window.webclawHost.addMessage("user", content);

          // Start stream with live provider routing
          window.webclawHost.startStream({
            provider: provider,
            model: model,
            messages: [{ role: "user", content: content }],
            onToken: function (token) {
              if (streamCursor && streamCursor.parentNode) {
                streamCursor.parentNode.removeChild(streamCursor);
              }
              if (agentBubble) {
                agentBubble.textContent += token;
                agentBubble.appendChild(streamCursor);
              }
              scrollToBottom();
            },
            onComplete: function (result) {
              if (streamCursor && streamCursor.parentNode) {
                streamCursor.parentNode.removeChild(streamCursor);
              }
              resetStreamingState();
              scrollToBottom();
            },
            onError: function (err) {
              if (streamCursor && streamCursor.parentNode) {
                streamCursor.parentNode.removeChild(streamCursor);
              }

              // Handle specific error cases
              const errorMessage =
                err && err.message ? err.message : "Stream error";
              let userMessage = errorMessage;
              let shouldSwitchProvider = false;

              if (
                errorMessage.includes("401") ||
                errorMessage.includes("Unauthorized") ||
                errorMessage.includes("Invalid") ||
                errorMessage.includes("credit balance is too low")
              ) {
                userMessage =
                  "Invalid API key or no credits - switching to available provider";
                shouldSwitchProvider = true;
              } else if (
                errorMessage.includes("429") ||
                errorMessage.includes("rate limit") ||
                errorMessage.includes("RateLimit")
              ) {
                userMessage = "Rate limited - please wait a moment";
              } else if (
                errorMessage.includes("No provider") ||
                errorMessage.includes("not found")
              ) {
                userMessage =
                  "Please enter your API key in Settings to enable live AI";
              }

              appendErrorBubble(userMessage);
              resetStreamingState();
              scrollToBottom();

              // If provider failed, try to switch to another available provider and retry
              if (shouldSwitchProvider && availableProviders.length > 1) {
                // Mark current provider as failed
                if (!failedProviders.includes(provider)) {
                  failedProviders.push(provider);
                  console.log("[UI] Provider", provider, "marked as failed");
                  updateProviderStatusIndicators();
                  updateModelSelector();
                }

                // Remove current failed provider from available list temporarily
                const currentProviderIdx = availableProviders.indexOf(provider);
                if (currentProviderIdx > -1) {
                  console.log(
                    "[UI] Provider",
                    provider,
                    "failed, removing from available list",
                  );
                  availableProviders.splice(currentProviderIdx, 1);
                }

                // Find next available provider
                const nextProvider = availableProviders.find(
                  (p) => !failedProviders.includes(p),
                );
                if (nextProvider) {
                  console.log(
                    "[UI] Auto-switching to next available provider:",
                    nextProvider,
                  );
                  // Find model for this provider
                  const options = modelSelector.querySelectorAll("option");
                  for (let i = 0; i < options.length; i++) {
                    if (options[i].value.startsWith(nextProvider + "/")) {
                      modelSelector.selectedIndex = i;
                      console.log("[UI] Switched to model:", options[i].value);
                      // Retry the message after a brief delay
                      setTimeout(function () {
                        userInput.value = content; // Restore the message
                        sendMessage();
                      }, 500);
                      return;
                    }
                  }
                }
              }
            },
          });
        }

        function resetStreamingState() {
          isStreaming = false;
          streamStatus.textContent = "";
          sendBtn.classList.remove("hidden");
          abortBtn.classList.add("hidden");
          agentBubble = null;
          streamCursor = null;
        }

        function abortMessage() {
          if (window.webclawHost) {
            window.webclawHost.abortStream();
          }
        }

        // ==========================================
        // Slash Command Handler
        // =========================================
        function handleSlashCommand(command, args) {
          switch (command) {
            case "help":
              showHelpMessage(args);
              return true;
            default:
              return false;
          }
        }

        function showHelpMessage(args) {
          // Create help response bubble
          const wrapper = document.createElement("div");
          wrapper.className = "flex justify-start";

          const bubble = document.createElement("div");
          bubble.className =
            "max-w-[80%] rounded-2xl rounded-tl-sm px-4 py-3 bg-gray-700 text-gray-100 text-sm";

          // Get tool name from args
          const toolMatch = args.match(/tool="([^"]+)"/);
          const verbose = args.includes("verbose=true");

          if (toolMatch) {
            const toolName = toolMatch[1];
            // Request help from agent for specific tool
            const content = `help tool="${toolName}"${verbose ? " verbose=true" : ""}`;

            // Create agent bubble for response
            agentBubble = appendAgentBubble();
            streamCursor = createStreamingCursor();
            agentBubble.appendChild(streamCursor);

            // Add message to conversation and trigger help
            if (window.webclawHost) {
              window.webclawHost.addMessage("user", content);

              const modelValue = modelSelector.value;
              const slashIdx = modelValue.indexOf("/");
              const provider =
                slashIdx > 0 ? modelValue.substring(0, slashIdx) : "anthropic";
              const model =
                slashIdx > 0 ? modelValue.substring(slashIdx + 1) : modelValue;

              isStreaming = true;
              streamStatus.textContent = "Getting help...";
              sendBtn.classList.add("hidden");
              abortBtn.classList.remove("hidden");

              window.webclawHost.startStream({
                provider: provider,
                model: model,
                messages: [{ role: "user", content: content }],
                onToken: function (token) {
                  if (streamCursor && streamCursor.parentNode) {
                    streamCursor.parentNode.removeChild(streamCursor);
                  }
                  if (agentBubble) {
                    agentBubble.textContent += token;
                    agentBubble.appendChild(streamCursor);
                  }
                  scrollToBottom();
                },
                onComplete: function (result) {
                  if (streamCursor && streamCursor.parentNode) {
                    streamCursor.parentNode.removeChild(streamCursor);
                  }
                  resetStreamingState();
                  scrollToBottom();
                },
                onError: function (err) {
                  if (streamCursor && streamCursor.parentNode) {
                    streamCursor.parentNode.removeChild(streamCursor);
                  }
                  appendErrorBubble(
                    "Failed to get help: " + (err.message || "Unknown error"),
                  );
                  resetStreamingState();
                  scrollToBottom();
                },
              });
            } else {
              // Fallback when host not ready
              bubble.innerHTML = `<strong>WebClaw Help</strong><br><br>
<strong>Available Commands:</strong><br>
/help - Show this help message<br>
/help tool="&lt;tool_name&gt;" - Get help for a specific tool<br><br>
<strong>Available Tools:</strong><br>
• web_fetch - Fetch content from URLs<br>
• web_search - Search the web<br>
• file_read - Read files<br>
• file_write - Write files<br>
• dir_list - List directories<br>
• file_search - Search in files<br>
• memory_store - Store memories<br>
• memory_search - Search memories<br>
• help - Get help on tools<br><br>
See AGENTS.md for full documentation.`;
              wrapper.appendChild(bubble);
              messages.appendChild(wrapper);
              scrollToBottom();
            }
          } else {
            // General help
            bubble.innerHTML = `<strong>WebClaw Help</strong><br><br>
<strong>Available Commands:</strong><br>
/help - Show this help message<br>
/help tool="&lt;tool_name&gt;" - Get help for a specific tool<br>
/help tool="&lt;tool_name&gt;" verbose=true - Detailed help with schema<br><br>
<strong>Quick Start:</strong><br>

📡 Web & Search: web_fetch, web_search<br>

🧠 Memory: memory_store, memory_search<br>
❓ Help: help<br><br>
Type <code>/help tool="file_read"</code> for tool-specific help.`;
            wrapper.appendChild(bubble);
            messages.appendChild(wrapper);
            scrollToBottom();

        // ==========================================
        // Test Provider Connection
        // ==========================================
        function testProviderConnection(providerId) {
          const provider = API_PROVIDERS.find(function (p) {
            return p.id === providerId;
          });
          if (!provider) return;

          // Prevent test if already streaming
          if (isStreaming) {
            showErrorToast("A stream is already in progress. Please wait.");
            return;
          }

          const testBtn = document.getElementById("test-btn-" + providerId);
          if (testBtn) {
            testBtn.disabled = true;
            testBtn.innerHTML = "⏳";
          }

          // Set streaming state to prevent chat during test
          isStreaming = true;

          // Use a cheap model for testing (haiku for Anthropic, gpt-3.5-turbo for OpenAI)
          let testModel;
          if (providerId === "anthropic") {
            testModel = "claude-3-haiku-20240307";
          } else if (providerId === "openai") {
            testModel = "gpt-3.5-turbo";
          } else {
            testModel = "openrouter/anthropic/claude-3-haiku-20240307";
          }

          console.log(
            "[UI] Testing connection to",
            providerId,
            "with model",
            testModel,
          );

          let testComplete = false;
          let tokenReceived = false;

          // Set a timeout to detect stuck streams
          const timeoutId = setTimeout(function () {
            if (!testComplete) {
              testComplete = true;

              // Reset streaming state
              isStreaming = false;

              console.error("[UI] Test connection timed out after 30 seconds");
              if (testBtn) {
                testBtn.disabled = false;
                testBtn.innerHTML = "🧪";
              }
              if (!tokenReceived) {
                showErrorToast(
                  "Connection test timed out. Check console for [DEBUG] logs.",
                );
              }
            }
          }, 30000);

          // Make a minimal test call
          window.webclawHost.startStream({
            provider: providerId,
            model: testModel,
            messages: [{ role: "user", content: "Say 'test'" }],
            onToken: function (token) {
              tokenReceived = true;
              console.log("[UI] Token received:", token);
            },
            onComplete: function () {
              if (testComplete) return;
              testComplete = true;
              clearTimeout(timeoutId);

              // Reset streaming state
              isStreaming = false;

              if (testBtn) {
                testBtn.disabled = false;
                testBtn.innerHTML = "🧪";
              }

              if (tokenReceived) {
                showErrorToast(
                  "Connection to " + provider.name + " successful!",
                );
                // Change toast to success style
                const toast = document.getElementById("error-toast");
                if (toast) {
                  toast.className =
                    "fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-green-900 text-green-100 px-4 py-3 rounded-lg shadow-lg z-50 flex items-center gap-3 max-w-md";
                  toast.innerHTML =
                    '<span class="text-green-400">✓</span><span>Connection to ' +
                    provider.name +
                    " successful!</span>";
                }
              } else {
                showErrorToast("Stream completed but no tokens received");
              }
            },
            onError: function (err) {
              if (testComplete) return;
              testComplete = true;
              clearTimeout(timeoutId);

              // Reset streaming state
              isStreaming = false;

              if (testBtn) {
                testBtn.disabled = false;
                testBtn.innerHTML = "🧪";
              }

              // Handle specific error types
              const errorMsg = err && err.message ? err.message : String(err);
              console.error("[UI] Test connection error:", errorMsg);

              // Mark provider as failed if invalid key or no credits
              if (
                errorMsg.includes("401") ||
                errorMsg.includes("Unauthorized") ||
                errorMsg.includes("invalid") ||
                errorMsg.includes("credit balance is too low")
              ) {
                if (!failedProviders.includes(providerId)) {
                  failedProviders.push(providerId);
                  console.log("[UI] Marked provider as failed:", providerId);
                  updateProviderStatusIndicators();
                  updateModelSelector();
                }
                showErrorToast(
                  "Invalid API key or no credits for " +
                    provider.name +
                    " — please check Settings",
                );
              } else if (
                errorMsg.includes("429") ||
                errorMsg.includes("rate limit")
              ) {
                showErrorToast(
                  "Rate limited on " +
                    provider.name +
                    " — please wait a moment",
                );
              } else if (
                errorMsg.includes("missing") ||
                errorMsg.includes("No provider")
              ) {
                showErrorToast(
                  "Please enter your " + provider.name + " API key in Settings",
                );
              } else {
                showErrorToast("Connection failed: " + errorMsg);
              }
            },
          });
        }

            connectBtn.textContent = "Connect";

            // Disconnect confirmation modal
            const disconnectModal = document.createElement("div");
            disconnectModal.id = "oauth-disconnect-modal-" + provider.id;
            disconnectModal.className =
              "hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50";
            disconnectModal.innerHTML = `
        <div class="bg-gray-800 rounded-lg p-6 max-w-sm mx-4">
          <h3 class="text-sm font-semibold text-gray-200 mb-2">Disconnect from ${provider.name}?</h3>
          <p class="text-xs text-gray-400 mb-4">This will remove your stored credentials. You can reconnect anytime.</p>
          <div class="flex gap-3 justify-end">
            <button id="oauth-cancel-disconnect-${provider.id}" class="bg-gray-700 hover:bg-gray-600 text-gray-200 rounded px-3 py-1.5 text-xs">Cancel</button>
            <button id="oauth-confirm-disconnect-${provider.id}" class="bg-red-600 hover:bg-red-500 text-white rounded px-3 py-1.5 text-xs">Disconnect</button>
          </div>
        </div>
      `;
            document.body.appendChild(disconnectModal);

            // Connect/Disconnect handler
            connectBtn.addEventListener("click", function () {
              const isConnected = connectBtn.textContent === "Disconnect";

              if (isConnected) {
                // Show confirmation modal
                disconnectModal.classList.remove("hidden");
              } else {
                // Initiate connection
                initiateOAuth(provider.id, connectBtn, statusSpan);
              }
            });

            // Modal button handlers
            document
              .getElementById("oauth-cancel-disconnect-" + provider.id)
              .addEventListener("click", function () {
                disconnectModal.classList.add("hidden");
              });

            document
              .getElementById("oauth-confirm-disconnect-" + provider.id)
              .addEventListener("click", function () {
                disconnectModal.classList.add("hidden");
                disconnectOAuth(provider.id, connectBtn, statusSpan);
              });

            actionDiv.appendChild(statusSpan);
            actionDiv.appendChild(connectBtn);

            row.appendChild(infoDiv);
            row.appendChild(actionDiv);
            container.appendChild(row);
          });

          // Load initial connection status
          updateAllConnectionStatus();
        }

        // Initiate OAuth connection
        async function initiateOAuth(providerId, btn, statusSpan) {
          btn.disabled = true;
          btn.textContent = "Connecting...";
          statusSpan.innerHTML =
            '<span class="inline-flex items-center"><span class="w-2 h-2 rounded-full bg-yellow-500 mr-1"></span>Connecting...</span>';
          statusSpan.className = "text-xs text-yellow-400";

          try {
            // Call Go OAuth manager via WASM export
            if (
              window.webclaw &&
              window.webclaw.oauth &&
              window.webclaw.oauth.initiateConnection
            ) {
              await window.webclaw.oauth.initiateConnection(providerId);

              // Success
              statusSpan.innerHTML =
                '<span class="inline-flex items-center"><span class="w-2 h-2 rounded-full bg-green-500 mr-1"></span>Connected</span>';
              statusSpan.className = "text-xs text-green-400";
              btn.textContent = "Disconnect";
              btn.className =
                "bg-red-700 hover:bg-red-600 text-white rounded px-3 py-1.5 text-xs font-medium";
              showToast("Connected to " + providerId, "success");
            } else {
              throw new Error("OAuth manager not available");
            }
          } catch (err) {
            console.error("[oauth] Connection failed:", err);
            statusSpan.innerHTML =
              '<span class="inline-flex items-center"><span class="w-2 h-2 rounded-full bg-red-500 mr-1"></span>Failed</span>';
            statusSpan.className = "text-xs text-red-400";
            btn.textContent = "Connect";
            showToast(
              "Connection failed: " + (err.message || "Unknown error"),
              "error",
            );
          } finally {
            btn.disabled = false;
          }
        }

        // Disconnect OAuth
        async function disconnectOAuth(providerId, btn, statusSpan) {
          btn.disabled = true;

          try {
            if (
              window.webclaw &&
              window.webclaw.oauth &&
              window.webclaw.oauth.disconnect
            ) {
              await window.webclaw.oauth.disconnect(providerId);

              // Success
              statusSpan.innerHTML =
                '<span class="inline-flex items-center"><span class="w-2 h-2 rounded-full bg-gray-500 mr-1"></span>Not connected</span>';
              statusSpan.className = "text-xs text-gray-500";
              btn.textContent = "Connect";
              btn.className =
                "bg-indigo-600 hover:bg-indigo-500 text-white rounded px-3 py-1.5 text-xs font-medium";
              showToast("Disconnected from " + providerId, "info");
            }
          } catch (err) {
            console.error("[oauth] Disconnect failed:", err);
            showToast(
              "Disconnect failed: " + (err.message || "Unknown error"),
              "error",
            );
          } finally {
            btn.disabled = false;
          }
        }

        // Update all connection statuses
        async function updateAllConnectionStatus() {
          if (
            !window.webclaw ||
            !window.webclaw.oauth ||
            !window.webclaw.oauth.getConnectionStatus
          ) {
            return;
          }

          try {
            const statuses = await window.webclaw.oauth.getConnectionStatus();

            if (Array.isArray(statuses)) {
              statuses.forEach(function (status) {
                const btn = document.getElementById(
                  "oauth-btn-" + status.provider,
                );
                const statusSpan = document.getElementById(
                  "oauth-status-" + status.provider,
                );

                if (!btn || !statusSpan) return;

                if (status.connected) {
                  const username = status.username
                    ? " (" + status.username + ")"
                    : "";
                  statusSpan.innerHTML =
                    '<span class="inline-flex items-center"><span class="w-2 h-2 rounded-full bg-green-500 mr-1"></span>Connected' +
                    username +
                    "</span>";
                  statusSpan.className = "text-xs text-green-400";
                  btn.textContent = "Disconnect";
                  btn.className =
                    "bg-red-700 hover:bg-red-600 text-white rounded px-3 py-1.5 text-xs font-medium";
                } else {
                  statusSpan.innerHTML =
                    '<span class="inline-flex items-center"><span class="w-2 h-2 rounded-full bg-gray-500 mr-1"></span>Not connected</span>';
                  statusSpan.className = "text-xs text-gray-500";
                  btn.textContent = "Connect";
                  btn.className =
                    "bg-indigo-600 hover:bg-indigo-500 text-white rounded px-3 py-1.5 text-xs font-medium";
                }
              });
            }
          } catch (err) {
            console.error("[oauth] Failed to update connection status:", err);
          }
        }

        // Toast notification helper
        function showToast(message, type) {
          const toast = document.createElement("div");
          const colors = {
            success: "bg-green-600",
            error: "bg-red-600",
            info: "bg-blue-600",
          };

          toast.className =
            "fixed bottom-4 right-4 " +
            (colors[type] || colors.info) +
            " text-white px-4 py-2 rounded-lg shadow-lg text-sm z-50";
          toast.textContent = message;

          document.body.appendChild(toast);

          setTimeout(function () {
            toast.remove();
          }, 3000);
        }

        // ==========================================
        // Identity Files UI
        // ==========================================
        const IDENTITY_FILES = [
          "IDENTITY.md",
          "SOUL.md",
          "USER.md",
          "AGENTS.md",
          "TOOLS.md",
          "HEARTBEAT.md",
        ];

        function buildIdentityFileList() {
          // Clear existing
          identityFileList.innerHTML = "";

          IDENTITY_FILES.forEach(function (filename) {
            const btn = document.createElement("button");
            btn.className =
              "w-full text-left px-3 py-2 rounded text-sm text-gray-300 hover:bg-gray-800 hover:text-gray-100";
            btn.textContent = filename;

            if (activeIdentityFile === filename) {
              btn.classList.add("bg-gray-800", "text-indigo-400");
            }

            btn.addEventListener("click", function () {
              // Remove active class from all
              Array.from(identityFileList.children).forEach(function (child) {
                child.classList.remove("bg-gray-800", "text-indigo-400");
              });
              btn.classList.add("bg-gray-800", "text-indigo-400");
              loadIdentityFile(filename);
            });

            identityFileList.appendChild(btn);
          });
        }

        function loadIdentityFile(filename) {
          activeIdentityFile = filename;
          identityFilename.textContent = filename;
          identitySaveBtn.classList.remove("hidden");
          identityEditor.value = "Loading...";

          // Check if webclaw.identity API is available
          if (
            !window.webclaw ||
            !window.webclaw.identity ||
            !window.webclaw.identity.getFile
          ) {
            console.warn("[UI] webclaw.identity.getFile not available");
            identityEditor.value =
              "Error: Identity API not available. Please wait for WASM to initialize.";
            return;
          }

          window.webclaw.identity
            .getFile(filename)
            .then(function (content) {
              identityEditor.value = content || "";
            })
            .catch(function (err) {
              console.error("[UI] Failed to load file:", err);
              identityEditor.value =
                "Error loading file: " +
                (err && err.message ? err.message : String(err));
            });
        }

        identitySaveBtn.addEventListener("click", function () {
          if (!activeIdentityFile) return;

          const content = identityEditor.value;
          identitySaveBtn.textContent = "Saving...";
          identitySaveBtn.disabled = true;

          if (
            window.webclaw &&
            window.webclaw.identity &&
            window.webclaw.identity.putFile
          ) {
            window.webclaw.identity
              .putFile(activeIdentityFile, content)
              .then(function () {
                identitySaveBtn.textContent = "Saved";
                identitySaveBtn.disabled = false;
                setTimeout(function () {
                  identitySaveBtn.textContent = "Save";
                }, 1500);
              })
              .catch(function (err) {
                console.error("[UI] Failed to save file:", err);
                identitySaveBtn.textContent = "Error";
                identitySaveBtn.disabled = false;
                setTimeout(function () {
                  identitySaveBtn.textContent = "Save";
                }, 1500);
              });
          } else {
            identitySaveBtn.textContent = "Not ready";
            identitySaveBtn.disabled = false;
            setTimeout(function () {
              identitySaveBtn.textContent = "Save";
            }, 1500);
          }
        });

        // ==========================================
        // WASM Ready Handler
        // ==========================================
        window.addEventListener("webclaw:host-ready", function () {
          console.log("[UI] Host ready, initializing UI components...");
          console.log(
            "[UI] webclaw APIs:",
            window.webclaw ? Object.keys(window.webclaw) : "not available",
          );

          buildSettingsUI();
          buildConnectedServicesUI();
          buildIdentityFileList();

          // Store original model option texts for later restoration
          const options = modelSelector.querySelectorAll("option");
          options.forEach(function (option) {
            if (!option.getAttribute("data-original-text")) {
              option.setAttribute("data-original-text", option.textContent);
            }
          });

          // Add welcome message if empty
          if (messages.children.length === 0) {
            loadWelcomeMessage();
          }

          // Function to load welcome message from external HTML
          function loadWelcomeMessage() {
            fetch("static/welcome.html")
              .then((response) => response.text())
              .then((html) => {
                // Create a temporary container to parse the HTML
                const tempDiv = document.createElement("div");
                tempDiv.innerHTML = html;

                // Extract the welcome message div
                const welcomeContent =
                  tempDiv.querySelector(".welcome-message");
                if (welcomeContent) {
                  messages.appendChild(welcomeContent);

                  // Execute any scripts in the welcome content
                  const scripts = welcomeContent.querySelectorAll("script");
                  scripts.forEach((script) => {
                    const newScript = document.createElement("script");
                    if (script.src) {
                      newScript.src = script.src;
                    } else {
                      newScript.textContent = script.textContent;
                    }
                    document.head.appendChild(newScript);
                  });

                  // Scroll to show welcome message
                  messages.scrollTop = messages.scrollHeight;
                }
              })
              .catch((err) => {
                console.error("[UI] Failed to load welcome message:", err);
                // Fallback to simple welcome
                const welcomeWrapper = document.createElement("div");
                welcomeWrapper.className = "flex justify-start";
                const welcomeBubble = document.createElement("div");
                welcomeBubble.className =
                  "max-w-[70%] rounded-2xl rounded-tl-sm px-4 py-2 bg-gray-700 text-gray-100 text-sm";
                welcomeBubble.textContent =
                  "Welcome to WebClaw! Type a message to start chatting.";
                welcomeWrapper.appendChild(welcomeBubble);
                messages.appendChild(welcomeWrapper);
              });
          }

          // Global function to open help docs
          window.loadHelpDocs = function () {
            window.open(
              "static/help.html",
              "_blank",
              "width=1200,height=800,scrollbars=yes",
            );
          };
        });

        // ==========================================
        // Init
        // ==========================================
        switchTab("chat");
      })();
    </script>
  </body>
</html>
